name: CI - Code Quality & Tests

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
      - develop
  workflow_dispatch:  # позволяет запускать вручную из интерфейса GitHub

jobs:
  # ============================================
  # JOB 1: Линтинг и проверка форматирования
  # ============================================
  lint:
    name: 🔍 Lint & Format Check
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff black mypy types-python-dateutil
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: 🎨 Run Ruff linter
        run: ruff check . --output-format=github

      - name: ⚫ Run Black formatter check
        run: black --check --diff .

      - name: 🔒 Run Mypy type check
        run: mypy src/ bot/ core/ services/ utils/ config/ --ignore-missing-imports

      - name: 🔐 Run Bandit security check
        run: bandit -r src/ bot/ core/ services/ -c pyproject.toml -ll

  # ============================================
  # JOB 2: Тестирование с несколькими версиями Python
  # ============================================
  test:
    name: 🧪 Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint  # запускается только после успешного линтинга

    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: 🧪 Run tests with coverage
        run: pytest tests/ -v --cov=src --cov=bot --cov=core --cov=services --cov-report=term --cov-report=xml

      - name: 📊 Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  # ============================================
  # JOB 3: Проверка безопасности зависимостей
  # ============================================
  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install pip-audit
        run: pip install pip-audit

      - name: 🔍 Scan dependencies for vulnerabilities
        run: pip-audit --requirement requirements.txt --requirement requirements-dev.txt 2>/dev/null || true

  # ============================================
  # JOB 4: Сборка Docker образа (опционально)
  # ============================================
  docker-build:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔨 Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: cyber-secretary:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max